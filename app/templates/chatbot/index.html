{% extends 'base.html' %}
{% block title %}Chatbot{% endblock %}
{% block content %}
<h2>🤖 Isamani Tour Assistant</h2>
<div class="card">
    <div class="card-body" id="chat-box" style="height:400px; overflow-y:auto; background:#f8f9fa;">
        {% for msg in history %}
        <div class="mb-2">
            <div class="text-end">
                <span class="badge bg-primary p-2">You: {{ msg.user_message }}</span>
            </div>
            <div class="mt-1">
                <span class="badge bg-secondary p-2">Bot: {{ msg.bot_response }}</span>
            </div>
        </div>
        {% else %}
        <p class="text-muted text-center mt-5">Start a conversation below...</p>
        {% endfor %}
    </div>
    <div class="card-footer">
        <div class="input-group">
            <input type="text" id="user-input" class="form-control" placeholder="Type a message..." />
            <button class="btn btn-primary" id="send-btn">Send</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const chatBox = document.getElementById('chat-box');
const userInput = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');

function appendMessage(sender, text, badgeClass) {
    const div = document.createElement('div');
    div.className = 'mb-2';
    div.innerHTML = `<div class="${sender === 'You' ? 'text-end' : ''}">
        <span class="badge ${badgeClass} p-2">${sender}: ${text}</span></div>`;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

sendBtn.addEventListener('click', async () => {
    const message = userInput.value.trim();
    if (!message) return;

    appendMessage('You', message, 'bg-primary');
    userInput.value = '';

    // BUG #31: CSRF token not included in fetch request — add it
    const response = await fetch('/chatbot/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message })
    });

    const data = await response.json();
    appendMessage('Bot', data.response, 'bg-secondary');
});

userInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendBtn.click();
});
</script>
{% endblock %}
