{% extends 'base.html' %}
{% block title %}My Posts{% endblock %}
{% block content %}
<h2>My Posts</h2>
{% for post in posts %}
<div class="card mb-2">
    <div class="card-body d-flex justify-content-between">
        <span>{{ post.title }}</span>
        <div>
            <a href="{{ url_for('blog.edit', id=post.id) }}" class="btn btn-sm btn-warning">Edit</a>
        </div>
    </div>
</div>
{% else %}
<p>You have no posts yet. <a href="{{ url_for('blog.create') }}">Create one</a></p>
{% endfor %}
{% endblock %}
